{% extends "base.html" %}
{% block title %}{{ unit.title }} – Geomix{% endblock %}
{% block body %}
<div class="intro-page">
  <div class="intro-card">
    <div class="intro-badge" style="background: {{ unit.color }}">
      <span>{{ unit.icon }}</span>
      UNIDADE {{ unit_id }}
    </div>

    <h1 class="intro-title">{{ unit.intro_title }}</h1>
    <p class="intro-body">{{ unit.intro_text }}</p>

    <!-- SVG figure gallery -->
    <div class="intro-figures" id="intro-figs"></div>

    <div class="intro-actions">
      <a href="/" class="btn btn-secondary">Voltar</a>
      <a href="/lesson/{{ unit_id }}/1" class="btn btn-primary btn-3d">
        Começar Unidade {{ unit_id }}
      </a>
    </div>
  </div>
</div>

<script>
const introFigures = {{ unit.intro_figures | tojson }};
const container = document.getElementById('intro-figs');
introFigures.forEach(fig => {
  const wrap = document.createElement('div');
  wrap.className = 'intro-fig-wrap';
  const svg = drawFigureSVG(fig, 90, 90);
  wrap.appendChild(svg);
  const label = document.createElement('div');
  label.className = 'intro-fig-label';
  label.textContent = FIGURE_NAMES[fig] || fig;
  wrap.appendChild(label);
  container.appendChild(wrap);
});
</script>
{% endblock %}
